server {
    listen 80;
    server_name fit.ileonov.ru;

    client_max_body_size 20M;

    root /var/www/fit.ileonov.ru;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:8000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Never cache Flutter bootstrap files — ensures fresh load after deploy.
    location ~* ^/(index\.html|flutter_service_worker\.js|flutter\.js)$ {
        try_files $uri =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Flutter asset files must return 404 if missing — NOT index.html.
    # Returning index.html (HTML) for missing assets causes FormatException
    # when Flutter tries to JSON-parse AssetManifest or other asset files.
    location /flutter_assets/ {
        try_files $uri =404;
    }

    # canvaskit wasm/js files — serve directly, no SPA fallback
    location /canvaskit/ {
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

name: alpha4sport_app
description: Personal self-hosted fitness tracker
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  dio: ^5.9.0
  flutter_svg: ^2.2.0
  flutter_riverpod: ^2.6.1
  go_router: ^16.2.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  fl_chart: ^1.1.1
  file_selector: ^1.0.3
  xml: ^6.6.1
  flutter_markdown: ^0.7.7+1

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: Bebas Neue Cyrillic
      fonts:
        - asset: assets/fonts/BebasNeue-Cyrillic.ttf
  assets:
    - assets/branding/logo-full.png
    - assets/branding/logo-full.svg
    - assets/branding/head.svg
    - assets/heatmap/body.svg
    - assets/heatmap/body_muscle_map.json
    - assets/content/motivational_quotes.txt
    - assets/programs/
